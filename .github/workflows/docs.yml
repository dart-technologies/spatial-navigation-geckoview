name: API docs

# Builds the TypeDoc API reference and publishes it to GitHub Pages.
# Requires Pages to be enabled with "GitHub Actions" as the source
# (Settings -> Pages -> Build and deployment -> Source). The first run
# attempts to enable it automatically via `enablement: true` below.

on:
  push:
    branches: [main]
    paths:
      - 'main.ts'
      - 'core/**'
      - 'messaging/**'
      - 'navigation/**'
      - 'utils/**'
      - 'globals.d.ts'
      - 'README.md'
      - 'typedoc.json'
      - 'tsconfig.json'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Least privilege: only the deploy job widens this (see below).
permissions:
  contents: read

# Allow one concurrent deployment; let an in-flight deploy finish rather
# than cancelling it (a half-published Pages site is worse than a stale one).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build TypeDoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22.14.0'
          cache: 'npm'
      - run: npm ci
      - name: Generate API docs
        run: npm run docs
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/api

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write # deploy to Pages
      id-token: write # OIDC token the deploy-pages action verifies
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
