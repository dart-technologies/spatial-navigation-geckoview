name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*'
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build only, no publish)'
        required: false
        type: boolean
        default: false

# Restrictive default for GITHUB_TOKEN; the build/create-release jobs escalate
# to the write scopes they need (packages: write, contents: write).
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.14.0'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@dart-technologies'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run benchmarks
        run: npm run test:benchmark

      - name: Lint TypeScript
        run: npm run lint

      - name: Build all distributions
        run: npm run build:all

      - name: Build type definitions
        run: npm run build:types

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: |
            dist/
            extension/

      - name: Publish to GitHub Packages
        if: ${{ !inputs.dry_run }}
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist

      - name: Create Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          generate_release_notes: true
          files: |
            dist/spatial-navigation.js
            dist/spatial-navigation.esm.js
            extension/spatial_navigation.js
            extension/spatial_navigation.debug.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
